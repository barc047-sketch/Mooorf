name: work-next-feature-check

on:
  push:
    branches:
      - work/next-feature

permissions:
  contents: read

jobs:
  focused-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Focused label tests
        run: npx tsx --test src/labels/*.test.ts
      - name: TypeScript
        run: npx tsc -b --pretty false
      - name: Diff check
        run: git diff --check HEAD~1..HEAD
