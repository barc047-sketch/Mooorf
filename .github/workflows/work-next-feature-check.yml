name: work-next-feature-check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-step-1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Focused label tests
        run: npx --yes tsx@4.20.3 --test src/labels/*.test.ts
      - name: TypeScript
        run: npx tsc -b --pretty false
      - name: Diff check
        run: git diff --check origin/main...HEAD
