<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MOOORF — C0.3 Icons & Symbols Inspector Lab</title>
<!-- Link production tokens directly to ensure perfect style parity -->
<link rel="stylesheet" href="../../src/styles/tokens.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="day">

<!-- ═══ SVG ICON SPRITE ═══ -->
<svg style="display:none" aria-hidden="true">
<defs>

  <symbol id="i-export" viewBox="0 0 24 24"><path d="M12 4v11M8 8l4-4 4 4M5 16v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"/></symbol>
  <symbol id="i-inbox" viewBox="0 0 24 24"><path d="M4 12h4l2 3h4l2-3h4M4 12l1.5-6h13L20 12M4 12v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/></symbol>
  <symbol id="i-account" viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c1.4-4 4-6 7-6s5.6 2 7 6"/></symbol>
  <symbol id="i-close" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>

  <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
  <symbol id="i-favourite" viewBox="0 0 24 24"><path d="M12 4l2.4 5.5 6 .6-4.5 4 1.3 5.9L12 17l-5.2 3 1.3-5.9-4.5-4 6-.6L12 4Z"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5"/><path d="M20 20l-4.5-4.5"/></symbol>
  <symbol id="i-warn" viewBox="0 0 24 24"><path d="M12 4l9 16H3L12 4Z"/><path d="M12 10v4M12 17h.01"/></symbol>
  <symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></symbol>

  <!-- Rail icons -->
  <symbol id="i-canvas" viewBox="0 0 24 24"><circle cx="9" cy="9" r="3"/><circle cx="16" cy="15" r="4"/></symbol>
  <symbol id="i-data" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
  <symbol id="i-dashboard" viewBox="0 0 24 24"><path d="M4 18V10M11 18V5M18 18v-7"/></symbol>
  <symbol id="i-templates" viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></symbol>
  <symbol id="i-files" viewBox="0 0 24 24"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/></symbol>

  <!-- Prototype spaces layout icons (V1) -->
  <symbol id="a-living" viewBox="0 0 24 24"><path d="M4 17v-4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4M4 17h16M6.5 11V8h11v3M8 17v2M16 17v2"/></symbol>
  <symbol id="a-bedroom" viewBox="0 0 24 24"><path d="M3.5 18.5v-6h17v6M3.5 12.5V6M3.5 15.5h17"/><rect x="5.5" y="9" width="5" height="2.6" rx="1"/></symbol>
  <symbol id="a-kitchen" viewBox="0 0 24 24"><path d="M5.5 11.5h13V17a2 2 0 0 1-2 2h-9a2 2 0 0 1-2-2zM3.5 11.5h17M9.5 8V6M14.5 8V6"/></symbol>
  <symbol id="a-toilet" viewBox="0 0 24 24"><rect x="9" y="3.5" width="6" height="5" rx="1"/><path d="M6.5 12.5a5.5 4.5 0 0 0 11 0v-2h-11z"/></symbol>
  <symbol id="a-stair" viewBox="0 0 24 24"><path d="M3.5 20h4.5v-4h4.5v-4H17V8h3.5"/></symbol>
  <symbol id="a-lift" viewBox="0 0 24 24"><rect x="5" y="3.5" width="14" height="17" rx="1"/><path d="M9 9.8l3-3 3 3M9 14.2l3 3 3-3"/></symbol>
  <symbol id="a-parking" viewBox="0 0 24 24"><path d="M8.5 20V4.5h5.5a4.2 4.2 0 0 1 0 8.4H8.5"/></symbol>
  <symbol id="a-circulation" viewBox="0 0 24 24"><path d="M19.5 12A7.5 7.5 0 1 1 15 5.3M15 2.5v3h3"/></symbol>
  <symbol id="a-service" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3.5V7M12 17v3.5M3.5 12H7M17 12h3.5M6 6l2.4 2.4M15.6 15.6L18 18M18 6l-2.4 2.4M8.4 15.6L6 18"/></symbol>

  <!-- Prototype landscape icons (V1) -->
  <symbol id="l-tree" viewBox="0 0 24 24"><circle cx="12" cy="9" r="5.4"/><path d="M12 14.4V20M9 20h6"/></symbol>
  <symbol id="l-green" viewBox="0 0 24 24"><path d="M5.5 19.5C5.5 11 10 6 19 6c0 9-4.5 13.5-13.5 13.5z"/><path d="M5.5 19.5C9 14.5 12 12 17 8.5"/></symbol>

  <symbol id="l-outdoor" viewBox="0 0 24 24"><circle cx="12" cy="8.5" r="3"/><path d="M12 2.5v1.6M6.7 4.7l1.2 1.2M17.3 4.7l-1.2 1.2M3.5 20h17M7 20c1-3 2.8-4.6 5-4.6s4 1.6 5 4.6"/></symbol>
  <symbol id="l-terrain" viewBox="0 0 24 24"><path d="M2.5 19.5l6.5-10 4 6 3-4 5.5 8z"/></symbol>

  <!-- Prototype zoning/diagram icons (V1) -->
  <symbol id="d-cutx" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M8.5 8.5l7 7M15.5 8.5l-7 7"/></symbol>
  <symbol id="d-entry" viewBox="0 0 24 24"><path d="M15.5 4H19a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-3.5M4 12h10M10.5 8.5L14 12l-3.5 3.5"/></symbol>
  <symbol id="d-exit" viewBox="0 0 24 24"><path d="M8.5 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h3.5M10 12h10M16.5 8.5L20 12l-3.5 3.5"/></symbol>
  <symbol id="d-public" viewBox="0 0 24 24"><circle cx="9" cy="8" r="2.6"/><circle cx="16" cy="9.5" r="2.1"/><path d="M4.5 19c.5-3.4 2.3-5.2 4.5-5.2s4 1.8 4.5 5.2M13.8 14.6c2.5.2 4.6 1.8 5.2 4.4"/></symbol>
  <symbol id="d-private" viewBox="0 0 24 24"><rect x="6.5" y="10.5" width="11" height="8.5" rx="1.2"/><path d="M9.5 10.5V8a2.5 2.5 0 0 1 5 0v2.5"/></symbol>
  <symbol id="d-restricted" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M6.3 6.3l11.4 11.4"/></symbol>
</defs>
</svg>

<!-- ═══ CANVAS VIEWPORT ═══ -->
<div id="stage">
  <div id="grid-layer" class="g-dotted"></div>
  <div id="world">
    <!-- Render 3 default cells in a relaxed cluster -->
    <div class="cell" id="c1" style="left: 200px; top: 180px; width: 120px; height: 120px; background-color: rgba(220, 216, 202, 0.85); --cell-c: 220, 216, 202;" data-name="Studio" data-area="48">
      <div class="core-dot"></div>
      <!-- Placeholder for applied icon -->
      <div class="cell-icon-wrap" id="c1-icon"></div>
      <div class="label-layer">
        <span class="nm">Studio</span>
        <span class="ar mono">48 m²</span>
      </div>
    </div>

    <div class="cell" id="c2" style="left: 360px; top: 220px; width: 90px; height: 90px; background-color: rgba(198, 190, 176, 0.85); --cell-c: 198, 190, 176;" data-name="Workspace" data-area="24">
      <div class="core-dot"></div>
      <div class="cell-icon-wrap" id="c2-icon"></div>
      <div class="label-layer">
        <span class="nm">Workspace</span>
        <span class="ar mono">24 m²</span>
      </div>
    </div>

    <div class="cell" id="c3" style="left: 260px; top: 340px; width: 100px; height: 100px; background-color: rgba(210, 206, 192, 0.85); --cell-c: 210, 206, 192;" data-name="Lounge" data-area="32">
      <div class="core-dot"></div>
      <div class="cell-icon-wrap" id="c3-icon"></div>
      <div class="label-layer">
        <span class="nm">Lounge</span>
        <span class="ar mono">32 m²</span>
      </div>
    </div>
  </div>

  <div id="selection-hint">Select a space and press <kbd>I</kbd> to open the Icons Inspector</div>
</div>

<!-- ═══ TOP CLUSTERS ═══ -->
<div id="top">
  <button id="drawer-launcher" class="launcher" data-tip="Project Drawer · ⌘K"><svg><use href="#i-drawer"/></svg></button>

  <div class="cluster" id="cl-project">
    <span class="cl-mark">MOOORF</span>
    <button class="cl-name" id="project-name-btn">Coexistence Studio<svg class="cl-chev"><use href="#i-chevron"/></svg></button>
    <span class="cl-save mono">Saved</span>
  </div>

  <div class="cluster" id="cl-floor">
    <span class="cl-floor-name mono">Ground Floor</span>
  </div>

  <div class="cluster" id="cl-history">
    <button data-tip="Undo · ⌘Z" id="undo-btn" disabled><svg><use href="#i-undo"/></svg></button>
    <button data-tip="Redo · ⇧⌘Z" id="redo-btn" disabled><svg><use href="#i-redo"/></svg></button>
    <button data-tip="History" id="history-btn"><svg><use href="#i-history"/></svg></button>
  </div>

  <div class="cluster" id="cl-quick">
    <button class="qv" data-qv="morph" data-tip="Morph · M"><svg><use href="#i-morph"/></svg></button>
    <button class="qv" data-qv="motion" data-tip="Motion · ⇧M"><svg><use href="#i-motion"/></svg></button>
    <button class="qv" data-qv="grid" data-tip="Grid · G"><svg><use href="#i-grid"/></svg></button>
    <button class="qv on" data-qv="labels" data-tip="Labels · L"><svg><use href="#i-labels"/></svg></button>
    <button class="qv" data-qv="fullscreen" data-tip="Full Screen · ⌘⇧F"><svg><use href="#i-fullscreen"/></svg></button>
  </div>

  <button id="mode-switch" class="cluster mode-switch" data-tip="Night mode · ⇧D">
    <span id="mode-label">Day</span>
  </button>
</div>

<!-- ═══ LEFT RAIL ═══ -->
<nav id="rail" aria-label="Workspace rail">
  <button class="rw active" data-rail="canvas" data-tip="Canvas · 1"><svg><use href="#i-canvas"/></svg></button>
  <button class="rw" data-rail="data" data-tip="Data / Table · 2"><svg><use href="#i-data"/></svg></button>
  <button class="rw" data-rail="dashboard" data-tip="Dashboard · 3"><svg><use href="#i-dashboard"/></svg></button>
  <div class="rail-sep"></div>
  <button class="rw" data-rail="files" data-tip="File Intake"><svg><use href="#i-files"/></svg></button>
</nav>

<!-- ═══ RIGHT INSPECTOR: ICONS & SYMBOLS ═══ -->
<aside id="inspector" hidden>
  <div class="insp-hd">
    <div class="insp-title-row">
      <span class="insp-title">Icons & Symbols</span>
      <span class="insp-badge mono" id="sel-badge">Selection</span>
    </div>
    <div class="insp-hd-actions">
      <button id="insp-pin" class="insp-icon-btn on" data-tip="Pin Inspector"><svg><use href="#i-pin"/></svg></button>
      <button id="insp-close" class="insp-icon-btn" data-tip="Close"><svg><use href="#i-close"/></svg></button>
    </div>
  </div>

  <div class="insp-body">
    <!-- SEARCH & SETS -->
    <div class="insp-sec">
      <div class="search-wrap">
        <svg class="search-icon"><use href="#i-search"/></svg>
        <input type="text" id="ic-search-input" placeholder="Search glyph library..." autocomplete="off"/>
        <button id="ic-search-clear" hidden><svg><use href="#i-close"/></svg></button>
      </div>
      
      <div class="set-chips-container">
        <button class="set-chip active" data-cat="all">All</button>
        <button class="set-chip" data-cat="architecture">Architecture</button>
        <button class="set-chip" data-cat="landscape">Landscape</button>
        <button class="set-chip" data-cat="diagram">Diagram</button>
        <button class="set-chip" data-cat="annotation">Annotation</button>
        <button class="set-chip" data-cat="navigation">Navigation</button>
        <button class="set-chip" data-cat="custom">Custom</button>
        <button class="set-chip" data-cat="recent">Recent</button>
        <button class="set-chip" data-cat="favourites">Favourites</button>
      </div>
      
      <!-- Icon library grid layout -->
      <div class="ic-grid" id="ic-library-grid"></div>
    </div>

    <!-- PLACEMENT & CUSTOM OFFSETS -->
    <div class="insp-sec">
      <div class="insp-sec-hd">Placement</div>
      <div class="insp-row">
        <label>Anchor</label>
        <div class="seg mini" id="opt-anchor">
          <button class="active" data-val="centre">Centre</button>
          <button data-val="above">Above</button>
          <button data-val="below">Below</button>
          <button data-val="top-left">T-L</button>
          <button data-val="top-right">T-R</button>
        </div>
      </div>
      <div class="insp-row custom-offsets">
        <label>Offset X</label>
        <input type="range" class="rng" id="opt-offset-x" min="-40" max="40" value="0"/>
        <span class="val mono" id="val-offset-x">0px</span>
      </div>
      <div class="insp-row custom-offsets">
        <label>Offset Y</label>
        <input type="range" class="rng" id="opt-offset-y" min="-40" max="40" value="0"/>
        <span class="val mono" id="val-offset-y">0px</span>
      </div>
    </div>

    <!-- APPEARANCE OVERRIDES -->
    <div class="insp-sec">
      <div class="insp-sec-hd">Appearance</div>
      <div class="insp-row">
        <label>Scale</label>
        <input type="range" class="rng" id="opt-scale" min="40" max="180" value="100"/>
        <span class="val mono" id="val-scale">100%</span>
      </div>
      <div class="insp-row">
        <label>Rotation</label>
        <input type="range" class="rng" id="opt-rotation" min="0" max="360" value="0"/>
        <span class="val mono" id="val-rotation">0°</span>
      </div>
      <div class="insp-row">
        <label>Opacity</label>
        <input type="range" class="rng" id="opt-opacity" min="10" max="100" value="100"/>
        <span class="val mono" id="val-opacity">100%</span>
      </div>
      <div class="insp-row">
        <label>Tint</label>
        <div class="tint-selector" id="opt-tint">
          <!-- Circular color swatches -->
          <button class="swatch active" style="background-color:#222222; --tint:#222222" data-tint="#222222" data-tip="Ink"></button>
          <button class="swatch" style="background-color:#c31616; --tint:#c31616" data-tint="#c31616" data-tip="Zonuert Red"></button>
          <button class="swatch" style="background-color:#4a6b5a; --tint:#4a6b5a" data-tint="#4a6b5a" data-tip="Sage"></button>
          <button class="swatch" style="background-color:#466080; --tint:#466080" data-tint="#466080" data-tip="Steel"></button>
          <button class="swatch" style="background-color:#806d48; --tint:#806d48" data-tint="#806d48" data-tip="Bronze"></button>
          <button class="swatch" style="background-color:#b4b09c; --tint:#b4b09c" data-tint="#b4b09c" data-tip="Muted Gray"></button>
        </div>
      </div>
    </div>

    <!-- WHITE CIRCULAR BACKING -->
    <div class="insp-sec">
      <div class="insp-sec-hd">Backing</div>
      <div class="insp-row">
        <label>Type</label>
        <div class="seg mini" id="opt-backing-type">
          <button data-val="none">None</button>
          <button class="active" data-val="circle">Circle</button>
          <button data-val="auto">Auto Contrast</button>
        </div>
      </div>
      <div class="insp-row backing-ctrls">
        <label>Size</label>
        <input type="range" class="rng" id="opt-backing-size" min="16" max="64" value="32"/>
        <span class="val mono" id="val-backing-size">32px</span>
      </div>
      <div class="insp-row backing-ctrls">
        <label>Opacity</label>
        <input type="range" class="rng" id="opt-backing-opacity" min="0" max="100" value="100"/>
        <span class="val mono" id="val-backing-opacity">100%</span>
      </div>
      <div class="insp-row backing-ctrls">
        <label>Offset X</label>
        <input type="range" class="rng" id="opt-backing-offset-x" min="-24" max="24" value="0"/>
        <span class="val mono" id="val-backing-offset-x">0px</span>
      </div>
      <div class="insp-row backing-ctrls">
        <label>Offset Y</label>
        <input type="range" class="rng" id="opt-backing-offset-y" min="-24" max="24" value="0"/>
        <span class="val mono" id="val-backing-offset-y">0px</span>
      </div>
      <div class="insp-row backing-ctrls">
        <label>Boundary</label>
        <button class="tgl on" id="opt-backing-boundary"></button>
        <span class="val" id="val-backing-boundary">on</span>
      </div>
      <div class="insp-row backing-boundary-ctrls">
        <label>Width</label>
        <input type="range" class="rng" id="opt-boundary-width" min="5" max="30" value="10"/>
        <span class="val mono" id="val-boundary-width">1.0px</span>
      </div>
    </div>

    <!-- SYSTEM DEFAULTS & BEHAVIOUR -->
    <div class="insp-sec">
      <div class="insp-sec-hd">Defaults & Export</div>
      <div class="insp-row">
        <label style="flex:1">Use Project Icon Defaults</label>
        <button class="tgl" id="opt-defaults-toggle"></button>
      </div>
      <div class="insp-row">
        <label>Hide Below</label>
        <input type="range" class="rng" id="opt-hide-zoom" min="20" max="150" value="45"/>
        <span class="val mono" id="val-hide-zoom">0.45x</span>
      </div>
      <div class="insp-row">
        <label style="flex:1">Include in Export</label>
        <button class="tgl on" id="opt-export-toggle"></button>
      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="insp-actions" id="inspector-actions">
      <button class="btn-clear danger" id="btn-remove-icon"><svg><use href="#i-trash"/></svg>Remove Icon</button>
    </div>
  </div>
</aside>

<div id="toast" class="toast-popup" hidden></div>

<!-- Custom Tooltips overlay -->
<div id="tooltip" class="tooltip-box" hidden></div>

<script src="prototype.js"></script>
</body>
</html>
